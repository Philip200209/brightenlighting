<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Brighten Lighting</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --gold: #FFD700;
            --dark: #0a0e27;
            --darker: #050812;
            --card-bg: #1a1f2e;
            --text-light: #e2e8f0;
            --text-muted: #a0aec0;
        }

        body {
            background: linear-gradient(135deg, #0a0e27 0%, #050812 100%);
            color: var(--text-light);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            background-color: var(--card-bg);
            border: 1px solid rgba(255, 215, 0, 0.1);
            border-radius: 12px;
            padding: 40px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
            color: #ffffff;
        }

        .logo-text {
            font-size: 14px;
            color: var(--gold);
            font-weight: 600;
            margin-bottom: 5px;
        }

        .login-header p {
            color: var(--text-muted);
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-light);
        }

        .form-input {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 8px;
            background-color: rgba(255, 255, 255, 0.05);
            color: var(--text-light);
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--gold);
            background-color: rgba(255, 215, 0, 0.05);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.1);
        }

        .form-input::placeholder {
            color: var(--text-muted);
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background-color: var(--gold);
            color: var(--dark);
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .login-btn:hover {
            background-color: #ffd700dd;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(255, 215, 0, 0.2);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .demo-credentials {
            margin-top: 25px;
            padding: 15px;
            background-color: rgba(255, 215, 0, 0.05);
            border-left: 3px solid var(--gold);
            border-radius: 4px;
        }

        .demo-credentials h3 {
            font-size: 12px;
            font-weight: 600;
            color: var(--gold);
            margin: 0 0 8px 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .demo-credentials p {
            font-size: 13px;
            color: var(--text-muted);
            margin: 4px 0;
            font-family: 'Courier New', monospace;
        }

        .error-message {
            display: none;
            padding: 12px;
            background-color: rgba(244, 67, 54, 0.1);
            border-left: 3px solid #F44336;
            border-radius: 4px;
            margin-bottom: 20px;
            color: #F44336;
            font-size: 14px;
        }

        .error-message.show {
            display: block;
        }

        @media (max-width: 768px) {
            .login-card {
                padding: 30px 20px;
            }

            .login-header h1 {
                font-size: 24px;
            }

            .form-input {
                font-size: 16px;
                padding: 10px;
            }

            .login-btn {
                padding: 10px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo-text">BRIGHTEN LIGHTING</div>
                <h1>Admin Portal</h1>
                <p>Sign in to manage your products and orders</p>
            </div>

            <div id="errorMessage" class="error-message"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <input type="text" id="username" class="form-input" placeholder="admin" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="Enter password" required>
                </div>

                <button type="submit" class="login-btn">Sign In</button>
            </form>

            <div class="demo-credentials">
                <h3>Demo Credentials</h3>
                <p>Username: <strong>admin</strong></p>
                <p>Password: <strong>admin123</strong></p>
            </div>
        </div>
    </div>

    <script>
        // Simulate a simple authentication
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('errorMessage');

            try {
                // Call the actual API
                const response = await fetch('https://brighten-lighting-api.onrender.com/api/admin/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok && data.token) {
                    // Store token and redirect
                    localStorage.setItem('adminToken', data.token);
                    window.location.href = `/brightenlighting/admin-dashboard.html#token=${data.token}`;
                } else {
                    errorMessage.textContent = 'Invalid credentials. Please try again.';
                    errorMessage.classList.add('show');
                }
            } catch (error) {
                console.error('Login error:', error);
                
                // Fallback: demo login
                if (username === 'admin' && password === 'admin123') {
                    const demoToken = 'demo-token-' + Date.now();
                    localStorage.setItem('adminToken', demoToken);
                    window.location.href = `/brightenlighting/admin-dashboard.html#token=${demoToken}`;
                } else {
                    errorMessage.textContent = 'Invalid credentials. Please try again.';
                    errorMessage.classList.add('show');
                }
            }
        });

        // Check if already logged in
        if (localStorage.getItem('adminToken')) {
            window.location.href = '/brightenlighting/admin-dashboard.html#token=' + localStorage.getItem('adminToken');
        }
    </script>
</body>
</html>
