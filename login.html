<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Admin Login | Brighten Lighting</title>
        <meta name="description" content="Sign in to the protected Brighten Lighting admin dashboard." />
        <link rel="stylesheet" href="styles.css" />
        <style>
            .login-shell {
                width: min(560px, calc(100% - 2rem));
                margin: 3rem auto;
            }

            .login-card {
                border: 1px solid var(--line);
                border-radius: 22px;
                background: linear-gradient(160deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.02));
                box-shadow: var(--shadow);
                padding: clamp(1.2rem, 3vw, 1.8rem);
            }

            .login-card h1 {
                margin: 0.35rem 0 0;
                text-transform: uppercase;
            }

            .login-card p {
                color: var(--muted);
                line-height: 1.6;
            }

            .login-form {
                display: grid;
                gap: 0.85rem;
                margin-top: 1rem;
            }

            .login-form label {
                display: grid;
                gap: 0.35rem;
                color: var(--cream);
            }

            .login-form input {
                border: 1px solid var(--line);
                border-radius: 12px;
                background: rgba(255, 255, 255, 0.04);
                color: var(--text);
                padding: 0.8rem 0.85rem;
                font: inherit;
            }

            .login-message {
                min-height: 1.2rem;
                color: var(--gold-bright);
                margin-top: 0.35rem;
            }

            .login-actions {
                display: flex;
                gap: 0.65rem;
                flex-wrap: wrap;
                margin-top: 0.2rem;
            }
        </style>
    </head>
    <body>
        <div class="bg-noise" aria-hidden="true"></div>

        <header class="site-header">
            <div class="brand-block">
                <a href="index.html" class="brand-mark">BRIGHTEN LIGHTING</a>
                <p class="brand-tag">Admin Sign In</p>
            </div>
            <nav class="top-nav" aria-label="Main navigation">
                <a href="index.html">Home</a>
                <a href="decorative.html">Decorative</a>
                <a href="gallery.html">Gallery</a>
                <a href="contact.html">Contact</a>
            </nav>
        </header>

        <main class="login-shell reveal">
            <section class="login-card">
                <p class="eyebrow">Protected Access</p>
                <h1>Admin Login</h1>
                <p>Sign in to manage products, review orders, and keep the storefront synced with the JSON data store.</p>

                <form class="login-form" id="loginForm">
                    <label>
                        Username
                        <input type="text" id="user" autocomplete="username" required />
                    </label>
                    <label>
                        Password
                        <input type="password" id="pass" autocomplete="current-password" required />
                    </label>
                    <div class="login-actions">
                        <button type="submit" class="btn btn-primary">Enter Dashboard</button>
                        <a href="index.html" class="btn btn-ghost">Back To Site</a>
                    </div>
                    <div class="login-message" id="loginMessage"></div>
                </form>
            </section>
        </main>

        <footer class="site-footer reveal">
            <div class="footer-links">
                <a href="index.html">Home</a>
                <a href="gallery.html">Gallery</a>
                <a href="contact.html">Contact</a>
            </div>
            <p class="copyright">&copy; <span id="year"></span> Brighten Lighting. All rights reserved.</p>
        </footer>

        <script src="script.js"></script>
        <script>
            const API_BASE = 'https://brighten-lighting-api.onrender.com';
            const form = document.querySelector('#loginForm');
            const message = document.querySelector('#loginMessage');

            const setMessage = (value, isError = false) => {
                if (!message) return;
                message.textContent = value;
                message.style.color = isError ? '#ff9c9c' : 'var(--gold-bright)';
            };

            const redirectIfLoggedIn = async () => {
                try {
                    const response = await fetch(`${API_BASE}/api/session`, {
                        credentials: 'include',
                    });
                    const session = await response.json();
                    if (session.loggedIn) {
                        window.location.href = `${API_BASE}/admin`;
                    }
                } catch {
                    // Stay on the login page if the session check fails.
                }
            };

            const login = async (event) => {
                event.preventDefault();

                const username = document.querySelector('#user').value.trim();
                const password = document.querySelector('#pass').value;

                setMessage('Logging in...', false);

                try {
                    console.log('Logging in to:', `${API_BASE}/api/admin/login`);
                    const response = await fetch(`${API_BASE}/api/admin/login`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        credentials: 'include',
                        body: JSON.stringify({ username, password }),
                    });

                    console.log('Login response status:', response.status);
                    const data = await response.json();
                    console.log('Login response data:', data);

                    if (response.ok) {
                        setMessage('Login successful!', false);
                        setTimeout(() => {
                            window.location.href = `${API_BASE}/admin`;
                        }, 500);
                        return;
                    }

                    setMessage(data.error || 'Invalid admin credentials.', true);
                } catch (error) {
                    console.error('Login error:', error);
                    setMessage(`Connection error: ${error.message}`, true);
                }
            };

            if (form) {
                form.addEventListener('submit', login);
            }

            redirectIfLoggedIn();
        </script>
    </body>
</html>
