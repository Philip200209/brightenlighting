services:
  - type: web
    name: brighten-lighting-api
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/products
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: FRONTEND_URL
        value: https://philip200209.github.io
      - key: CORS_ORIGINS
        value: https://philip200209.github.io,https://philip200209.github.io/brightenlighting,https://brightenlighting.onrender.com
      - key: MONGODB_URI
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: ADMIN_USER
        value: admin
      - key: ADMIN_PASS
        sync: false